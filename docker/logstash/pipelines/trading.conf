input {
  beats {
    port => 5044
  }
  tcp {
    port => 50000
    codec => json
  }
}

filter {
  if [event_category] == "trade" {
    mutate {
      add_field => { "index_name" => "trading-trades-%{+YYYY.MM}" }
    }
  } else if [event_category] == "user" {
    mutate {
      add_field => { "index_name" => "trading-users-%{+YYYY.MM}" }
    }
  } else if [event_category] == "strategy" {
    mutate {
      add_field => { "index_name" => "trading-strategies-%{+YYYY.MM}" }
    }
  } else if [event_category] == "risk" {
    mutate {
      add_field => { "index_name" => "trading-risk-events-%{+YYYY.MM}" }
    }
  } else if [event_category] == "security" {
    mutate {
      add_field => { "index_name" => "trading-security-%{+YYYY.MM}" }
    }
  } else if [event_category] == "request" {
    mutate {
      add_field => { "index_name" => "trading-requests-%{+YYYY.MM}" }
    }
  } else {
    mutate {
      add_field => { "index_name" => "trading-logs-%{+YYYY.MM}" }
    }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  if [correlation_id] {
    mutate {
      rename => { "correlation_id" => "trace.id" }
    }
  }

  if [user_id] {
    mutate {
      add_field => { "user.id" => "%{user_id}" }
    }
  }

  if [order_id] {
    mutate {
      add_field => { "order.id" => "%{order_id}" }
    }
  }

  if [strategy_id] {
    mutate {
      add_field => { "strategy.id" => "%{strategy_id}" }
    }
  }

  geoip {
    source => "ip_address"
    target => "geoip"
    add_field => [ "[geoip][country_name]", "%{geoip.country_name}" ]
    add_field => [ "[geoip][city_name]", "%{geoip.city_name}" ]
  }

  if [message] and [message] != "" {
    mutate {
      gsub => [ "message", "\n", " " ]
      gsub => [ "message", "\r", " " ]
    }
  }

  ruby {
    code => "
      event.set('log_level', event.get('level').upcase if event.get('level'))
    "
  }

  if [event_category] == "security" and [severity] == "high" {
    ruby {
      code => "
        event.set('urgent', true)
      "
    }
  }
}

output {
  if [index_name] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "%{index_name}"
      document_id => "%{audit_id}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      ssl => true
      ssl_verification_mode => "certificate"
    }
  }

  if [event_category] == "risk" or [event_category] == "security" {
    stdout {
      codec => rubydebug
    }
  }
}