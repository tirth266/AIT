# =============================================================================
# TRADING PLATFORM NGINX CONFIGURATION
# =============================================================================
# Reverse proxy, load balancing, WebSocket support, SSL-ready

# =============================================================================
# UPSTREAM BACKEND SERVERS
# =============================================================================
upstream trading_backend {
    least_conn;
    server backend:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# =============================================================================
# UPSTREAM FRONTEND
# =============================================================================
upstream trading_frontend {
    server frontend:80;
}

# =============================================================================
# RATE LIMITING ZONES
# =============================================================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# =============================================================================
# HTTP SERVER
# =============================================================================
server {
    listen 80;
    server_name localhost;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Backend health check
    location /api/health {
        proxy_pass http://trading_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # WebSocket endpoint (must be before general /api proxy)
    location /socket.io/ {
        proxy_pass http://trading_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Critical: WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket timeouts (longer for real-time trading)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering for WebSocket
        proxy_buffering off;
        proxy_request_buffering off;

        # WebSocket specific headers
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://trading_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support (needed for some API calls)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";

        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
    }

    # Frontend static assets with caching
    location /static/ {
        proxy_pass http://trading_frontend;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Frontend assets
    location /assets/ {
        proxy_pass http://trading_frontend;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # Frontend (SPA routing) - catch all
    location / {
        proxy_pass http://trading_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Support for SSE (Server-Sent Events)
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

