---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-app-config
  namespace: trading-platform
data:
  FLASK_ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  TRADING_MODE: "paper"
  PAPER_BALANCE: "100000"
  CORS_ORIGINS: "https://trading.yourdomain.com"
  RATELIMIT_ENABLED: "true"
  RATELIMIT_DEFAULT: "100/minute"
  RISK_MAX_DAILY_LOSS_PERCENT: "5.0"
  RISK_PER_TRADE_PERCENT: "1.0"
  RISK_MAX_OPEN_POSITIONS: "3"
  RISK_MAX_CONSECUTIVE_LOSSES: "3"
  RISK_MAX_DRAWDOWN_PERCENT: "10.0"
  CELERY_TASK_TRACK_STARTED: "true"
  LOGSTASH_HOST: "logstash.elastic-stack.svc.cluster.local"
  LOGSTASH_PORT: "5044"
  ENABLE_LOGSTASH: "false"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: trading-platform
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        server_tokens off;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api {
            proxy_pass http://trading-backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        location /socket.io {
            proxy_pass http://trading-backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: trading-platform
data:
  redis.conf: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    save 900 1
    save 300 10
    save 60 10000
    timeout 0
    tcp-keepalive 300
    tcp-backlog 511