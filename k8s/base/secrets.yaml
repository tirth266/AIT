---
apiVersion: v1
kind: Secret
metadata:
  name: trading-app-secret
  namespace: trading-platform
type: Opaque
stringData:
  SECRET_KEY: ${SECRET_KEY}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  MONGO_PASSWORD: ${MONGO_PASSWORD}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
---
apiVersion: v1
kind: Secret
metadata:
  name: trading-db-secret
  namespace: trading-platform
type: Opaque
stringData:
  mongo-uri: mongodb://trading-admin:${MONGO_PASSWORD}@mongodb.trading-platform.svc.cluster.local:27017/trading_db?authSource=admin
  redis-url: redis://:${REDIS_PASSWORD}@redis.trading-platform.svc.cluster.local:6379/0
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-certificates
  namespace: trading-platform
type: kubernetes.io/tls
stringData:
  # Generated via: kubectl create secret tls trading-tls --cert=path/to/cert.pem --key=path/to/key.pem -n trading-platform
  # Or cert-manager will auto-generate
---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry
  namespace: trading-platform
type: kubernetes.io/dockerconfigjson
data:
  # Base64 encoded: echo -n '{"docker.io":{"username":"user","password":"pass","email":"email","auth":"base64"}}' | base64
  .dockerconfigjson: ${DOCKER_CONFIG_JSON}