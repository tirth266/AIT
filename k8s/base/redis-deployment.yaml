---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-scripts
  namespace: trading-platform
data:
  redis-check.sh: |
    #!/bin/sh
    REDIS_PASSWORD=${REDIS_PASSWORD} redis-cli -a ${REDIS_PASSWORD} --no-auth-warning ping
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-master
  namespace: trading-platform
  labels:
    app: redis
    component: cache
spec:
  serviceName: redis-master
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        component: cache
    spec:
      serviceAccountName: trading-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              exec redis-server /etc/redis/redis.conf \
                --requirepass ${REDIS_PASSWORD} \
                --maxmemory 256mb \
                --maxmemory-policy allkeys-lru \
                --appendonly yes
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-app-secret
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a ${REDIS_PASSWORD} --no-auth-warning ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a ${REDIS_PASSWORD} --no-auth-warning ping
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: trading-platform
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: trading-platform
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  clusterIP: None
  selector:
    app: redis