# Grafana datasources configuration
# Auto-provisioned datasources for monitoring stack

apiVersion: 1

datasources:
  # Prometheus - Primary metrics backend
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      queryTimeout: 60s

  # Loki - Log aggregation
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: trace_id
          matcherRegex: trace_id=([a-zA-Z0-9-]+)
          url: 'http://tempo:4317/api/search?query=${__value.raw}'
          datasourceUid: tempo

  # Tempo - Distributed tracing
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3100
    editable: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus

  # Alertmanager - Alert routing
  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: false
    jsonData:
      handleGrafanaManagedAlerts: false