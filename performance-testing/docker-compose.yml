# Docker Compose for Performance Testing Infrastructure
# Usage: docker-compose up -d

version: '3.8'

services:
  # MongoDB for stress testing
  mongodb:
    image: mongo:7.0
    container_name: trading_perf_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: trading_platform
    volumes:
      - mongodb_data:/data/db
    command: mongod --wiredTigerCacheSizeGB 2

  # Redis for caching tests
  redis:
    image: redis:7-alpine
    container_name: trading_perf_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  # Mock trading API server for testing
  trading-api:
    image: nginx:alpine
    container_name: trading_perf_api
    ports:
      - "3000:80"
    volumes:
      - ./mock_server:/usr/share/nginx/html
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # WebSocket server for testing
  websocket-server:
    image: node:18-alpine
    container_name: trading_perf_websocket
    ports:
      - "8080:8080"
    working_dir: /app
    command: node -e "
      const http = require('http');
      const wss = require('ws');
      const server = http.createServer((req, res) => {
        res.writeHead(200, {'Content-Type': 'application/json'});
        res.end(JSON.stringify({status: 'ok'}));
      });
      const wss = new wss.Server({server});
      wss.on('connection', (ws) => {
        setInterval(() => {
          ws.send(JSON.stringify({
            type: 'tick',
            symbol: 'RELIANCE',
            price: Math.random() * 5000,
            volume: Math.floor(Math.random() * 10000),
            timestamp: Date.now()
          }));
        }, 10);
      });
      server.listen(8080, () => console.log('WS server running on 8080'));
    "

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: trading_perf_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: trading_perf_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data: