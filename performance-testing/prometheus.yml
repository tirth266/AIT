# Prometheus Configuration for Trading Platform Performance Testing

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'trading-platform'
    static_configs:
      - targets: ['trading-api:3000']

  - job_name: 'websocket-server'
    static_configs:
      - targets: ['websocket-server:8080']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb:27017']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Custom alerting rules
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - 'alerts.yml'