apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: trading-platform
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: backend
---
apiVersion: v1
kind: Service
metadata:
  name: backend-headless
  namespace: trading-platform
  labels:
    app: backend
spec:
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: backend
---
apiVersion: v1
kind: Service
metadata:
  name: websocket
  namespace: trading-platform
  labels:
    app: websocket
spec:
  type: ClusterIP
  ports:
    - name: ws
      port: 8080
      targetPort: ws
      protocol: TCP
    - name: wss
      port: 8443
      targetPort: ws
      protocol: TCP
  selector:
    app: websocket
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: trading-platform
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-external
  namespace: trading-platform
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
    - name: https
      port: 443
      targetPort: http
      protocol: TCP
  selector:
    app: frontend