apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: trading-platform
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/trading"
  redis-url: "redis://redis:6379/0"
  mongodb-url: "mongodb://mongo:27017/trading"
  jwt-secret: "change-this-in-production"
  api-key: "change-this"
  secret-key: "change-this"
---
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secrets
  namespace: trading-platform
type: Opaque
stringData:
  auth0-domain: "your-tenant.auth0.com"
  auth0-client-id: "your-client-id"
  auth0-client-secret: "your-client-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: broker-secrets
  namespace: trading-platform
type: Opaque
stringData:
  zerodha-api-key: ""
  zerodha-api-secret: ""
  upstox-api-key: ""
  upstox-api-secret: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-certificates
  namespace: trading-platform
type: kubernetes.io/tls
data:
  # Base64 encoded cert and key - use external secret management in production
  # This is a placeholder - use cert-manager in production