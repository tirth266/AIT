apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading-platform

resources:
  - namespace.yaml
  - rbac.yaml
  - network-policy.yaml
  - configmaps.yaml
  - secrets.yaml
  - deployment-backend.yaml
  - deployment-frontend.yaml
  - services.yaml
  - ingress.yaml
  - hpa-pdb.yaml

commonLabels:
  app.kubernetes.io/name: trading-platform
  app.kubernetes.io/part-of: trading-platform

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - ENV=production
      - LOG_LEVEL=INFO

images:
  - name: ghcr.io/trading-platform/backend
    newTag: latest
  - name: ghcr.io/trading-platform/frontend
    newTag: latest

vars:
  - name: BACKEND_IMAGE
    objref:
      kind: Deployment
      name: backend
      apiVersion: apps/v1
    fieldref:
      spec.template.spec.containers[0].image
  - name: FRONTEND_IMAGE
    objref:
      kind: Deployment
      name: frontend
      apiVersion: apps/v1
    fieldref:
      spec.template.spec.containers[0].image