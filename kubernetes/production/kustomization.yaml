apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading-platform

resources:
  - ../base

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "2Gi"
    target:
      kind: Deployment
      name: backend

replicas:
  - name: backend
    count: 5
  - name: frontend
    count: 3
  - name: websocket
    count: 5

images:
  - name: ghcr.io/trading-platform/backend
    newTag: v1.0.0
  - name: ghcr.io/trading-platform/frontend
    newTag: v1.0.0

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - ENV=production
      - LOG_LEVEL=WARN
      - RATE_LIMIT_REQUESTS=5000
      - DATABASE_POOL_SIZE=50

namePrefix: prod-

commonLabels:
  environment: production

vars:
  - name: DEPLOYMENT_ID
    value: "v1-0-0-$(date +%Y%m%d-%H%M%S)"
    generate: expression
    expression: "v1-0-0-{{ now | date: \"20060102150405\" }}"